services:
  dev:
    image: mcr.microsoft.com/devcontainers/python:3.11
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /workspace/src/libs
      LLM_BASE_URL: http://llm-server:8080/v1
      LLM_API_KEY: ${LLM_API_KEY:-local-internal-key}
      LLM_MODEL: gcc-medical-llm
      EMBEDDING_BASE_URL: http://embedding-server:8081/v1
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-local-internal-key}
      EMBEDDING_MODEL: diver-retriever
      EMBEDDING_DIMENSION: "1024"
      RERANKER_BASE_URL: http://reranker-server:8082/v1
      RERANKER_API_KEY: ${RERANKER_API_KEY:-local-internal-key}
      RERANKER_MODEL: qwen3-reranker
    volumes:
      - .:/workspace
    working_dir: /workspace
    networks:
      - medical-internal
    command: ["sleep", "infinity"]
    tty: true
    stdin_open: true
    ipc: host
    privileged: true

  llm-server:
    image: ghcr.io/ggml-org/llama.cpp:server-b9982
    environment:
      LLAMA_CACHE: /models
      HF_TOKEN: ${HF_TOKEN:-}
    command:
      - -hf
      - mradermacher/GCCL-Medical-LLM-Qwen3.5-4B-GGUF
      - -hff
      - GCCL-Medical-LLM-Qwen3.5-4B.Q8_0.gguf
      - --no-mmproj
      - --alias
      - gcc-medical-llm
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "4096"
      - --n-gpu-layers
      - "0"
      - --parallel
      - "1"
      - --batch-size
      - "128"
      - --ubatch-size
      - "64"
      - --flash-attn
      - auto
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --jinja
      - --reasoning
      - auto
      - --no-webui
      - --metrics
      - --api-key
      - ${LLM_API_KEY:-local-internal-key}
    volumes:
      - model-cache:/models
    networks:
      - medical-internal
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/health | grep --quiet ok"]
      interval: 15s
      timeout: 5s
      retries: 60
      start_period: 120s
    restart: unless-stopped

  embedding-server:
    image: ghcr.io/ggml-org/llama.cpp:server-b9982
    environment:
      LLAMA_CACHE: /models
      HF_TOKEN: ${HF_TOKEN:-}
    command:
      - -hf
      - mradermacher/Diver-Retriever-0.6B-GGUF
      - -hff
      - Diver-Retriever-0.6B.Q8_0.gguf
      - --no-mmproj
      - --alias
      - diver-retriever
      - --host
      - 0.0.0.0
      - --port
      - "8081"
      - --embedding
      - --pooling
      - last
      - --ctx-size
      - "2048"
      - --n-gpu-layers
      - "0"
      - --parallel
      - "1"
      - --no-webui
      - --api-key
      - ${EMBEDDING_API_KEY:-local-internal-key}
    volumes:
      - model-cache:/models
    networks:
      - medical-internal
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8081/health | grep --quiet ok"]
      interval: 15s
      timeout: 5s
      retries: 60
      start_period: 60s
    restart: unless-stopped

  reranker-server:
    image: ghcr.io/ggml-org/llama.cpp:server-b9982
    environment:
      LLAMA_CACHE: /models
      HF_TOKEN: ${HF_TOKEN:-}
    command:
      - -hf
      - ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF
      - -hff
      - qwen3-reranker-0.6b-q8_0.gguf
      - --no-mmproj
      - --alias
      - qwen3-reranker
      - --host
      - 0.0.0.0
      - --port
      - "8082"
      - --rerank
      - --ctx-size
      - "2048"
      - --n-gpu-layers
      - "0"
      - --parallel
      - "1"
      - --no-webui
      - --api-key
      - ${RERANKER_API_KEY:-local-internal-key}
    volumes:
      - model-cache:/models
    networks:
      - medical-internal
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8082/health | grep --quiet ok"]
      interval: 15s
      timeout: 5s
      retries: 60
      start_period: 60s
    restart: unless-stopped

networks:
  medical-internal:
    driver: bridge

volumes:
  model-cache:
